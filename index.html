<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>商品スキャナー (iOS対応版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        /* iPhoneのノッチや下部バーを考慮した基本設定 */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            padding: 0; 
            background: #f2f2f7; 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            overflow: hidden;
        }
        
        /* 固定ヘッダー：カメラと操作系 */
        .fixed-header {
            background: white;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 10px;
            padding-top: env(safe-area-inset-top); /* iPhoneのノッチ対策 */
        }

        /* カメラを正方形に近い形にしてスペースを節約 */
        #interactive { 
            width: 100%; 
            height: 160px; 
            border-radius: 12px; 
            background: #000; 
            overflow: hidden;
            position: relative;
        }
        #interactive video { 
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%;
            min-height: 100%;
            object-fit: cover;
        }

        .status-msg { 
            text-align: center; 
            font-size: 14px; 
            font-weight: 600; 
            padding: 8px 0;
            color: #ff3b30; 
        }

        .controls { display: flex; gap: 10px; margin-top: 5px; }
        .btn { 
            border: none; 
            padding: 14px; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer; 
            flex: 1; 
            font-size: 15px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-next { background: #007aff; color: white; }
        .btn-download { background: #34c759; color: white; }
        .btn-next:disabled { background: #d1d1d6; color: #8e8e93; }

        /* スクロールエリア */
        .list-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px;
            -webkit-overflow-scrolling: touch; /* iOSでのスクロールを滑らかに */
        }

        .product-group { 
            background: white; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            border: 1px solid #e5e5ea;
        }
        .product-header { padding: 12px; border-bottom: 1px solid #e5e5ea; }
        .model-input { 
            width: 100%; 
            border: 1px solid #007aff; 
            padding: 10px; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px; /* 16px以上にすることでiOSのズームを防ぐ */
            background: #fff; 
            -webkit-appearance: none;
        }
        .jan-label { font-size: 11px; color: #8e8e93; display: block; margin-top: 6px; }
        
        .discount-item { 
            padding: 10px 12px; 
            border-bottom: 1px solid #f2f2f7; 
            background: #fafafa;
        }
        .discount-name-input { 
            width: 100%; 
            border: 1px solid #c7c7cc; 
            padding: 8px; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 14px; 
        }
    </style>
</head>
<body>

    <div class="fixed-header">
        <div id="status" class="status-msg">バーコードをスキャンしてください</div>
        <div id="interactive"></div>
        <div class="controls">
            <button id="next-btn" class="btn btn-next" onclick="prepareNextScan()" disabled>次へ (確定)</button>
            <button class="btn btn-download" onclick="downloadCSV()">CSV保存</button>
        </div>
    </div>

    <div id="result-area" class="list-container">
        <!-- スキャン結果 -->
    </div>

    <script>
        let isWaitingForNext = false; 
        let lastProductGroupId = null;

        Quagga.init({
            inputStream: { 
                name: "Live", 
                type: "LiveStream", 
                target: document.querySelector('#interactive'), 
                constraints: { 
                    facingMode: "environment",
                    aspectRatio: { min: 1, max: 2 }
                } 
            },
            decoder: { readers: ["ean_reader"] }
        }, (err) => { 
            if (err) {
                document.getElementById('status').innerText = "カメラエラー: " + err;
                return;
            }
            Quagga.start(); 
        });

        Quagga.onDetected((result) => {
            if (isWaitingForNext) return; 

            const code = result.codeResult.code;
            isWaitingForNext = true;
            
            document.getElementById('next-btn').disabled = false;
            const status = document.getElementById('status');
            status.innerText = "完了！確定ボタンを押してください";
            status.style.color = "#34c759";

            // 商品(45/49)か割引かの判定
            if (!lastProductGroupId || code.startsWith('45') || code.startsWith('49')) {
                createNewProductGroup(code);
            } else {
                addDiscountToLastProduct(code);
            }

            if (window.navigator.vibrate) window.navigator.vibrate(100);
        });

        function prepareNextScan() {
            isWaitingForNext = false;
            document.getElementById('next-btn').disabled = true;
            const status = document.getElementById('status');
            status.innerText = "バーコードをスキャンしてください";
            status.style.color = "#ff3b30";
        }

        function createNewProductGroup(jan) {
            const resultArea = document.getElementById('result-area');
            const groupId = 'prod-' + Date.now();
            lastProductGroupId = groupId;

            const groupDiv = document.createElement('div');
            groupDiv.className = 'product-group';
            groupDiv.id = groupId;
            groupDiv.dataset.prodJan = jan;
            
            groupDiv.innerHTML = `
                <div class="product-header">
                    <input type="text" class="model-input" placeholder="商品名/型番を入力" value="">
                    <span class="jan-label">商品 JAN: ${jan}</span>
                </div>
                <div class="discount-list" id="discounts-${groupId}"></div>
            `;
            resultArea.insertBefore(groupDiv, resultArea.firstChild);
        }

        function addDiscountToLastProduct(jan) {
            if (!lastProductGroupId) return;
            const discountList = document.getElementById(`discounts-${lastProductGroupId}`);
            const item = document.createElement('div');
            item.className = 'discount-item';
            item.dataset.discountJan = jan;
            item.innerHTML = `
                <span class="jan-label">割引JAN: ${jan}</span>
                <input type="text" class="discount-name-input" placeholder="施策名を入力">
            `;
            discountList.appendChild(item);
        }

        function downloadCSV() {
            let csvContent = "\uFEFF"; 
            csvContent += "商品型番,商品JAN,割引JAN,割引名称\n";
            const groups = document.querySelectorAll('.product-group');
            
            groups.forEach(group => {
                const prodModel = group.querySelector('.model-input').value || "未入力";
                const prodJan = group.dataset.prodJan;
                const discounts = group.querySelectorAll('.discount-item');

                if (discounts.length === 0) {
                    csvContent += `"${prodModel}","${prodJan}","",""\n`;
                } else {
                    discounts.forEach(d => {
                        const dJan = d.dataset.discountJan;
                        const dName = d.querySelector('.discount-name-input').value || "";
                        csvContent += `"${prodModel}","${prodJan}","${dJan}","${dName}"\n`;
                    });
                }
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `scan_${new Date().getTime()}.csv`;
            link.click();
        }
    </script>
</body>
</html>
