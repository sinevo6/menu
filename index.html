<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>型番OCRスキャナー改</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 0; background: #f2f2f7; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header-section { background: #fff; border-bottom: 1px solid #d1d1d6; z-index: 100; }
        #interactive { width: 100%; height: 160px; background: #000; position: relative; overflow: hidden; }
        #interactive video { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100% !important; height: auto !important; }
        .scan-guide { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; height: 30px; border: 2px solid #007aff; border-radius: 4px; box-shadow: 0 0 0 999px rgba(0,0,0,0.5); z-index: 5; pointer-events: none; }
        .status-msg { text-align: center; font-size: 13px; font-weight: bold; padding: 8px; color: #ff3b30; }
        .list-container { flex: 1; overflow-y: auto; padding: 10px; padding-bottom: 120px; }
        .bottom-controls { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.9); padding: 15px; display: flex; gap: 10px; border-top: 1px solid #d1d1d6; z-index: 1000; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        .btn { border: none; border-radius: 10px; font-weight: bold; flex: 1; padding: 15px; font-size: 16px; }
        .btn-next { background: #007aff; color: white; }
        .btn-download { background: #34c759; color: white; }
        .product-group { background: white; border-radius: 12px; margin-bottom: 12px; border: 1px solid #e5e5ea; padding: 12px; }
        .input-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .model-input { flex: 1; border: 2px solid #007aff; padding: 10px; border-radius: 8px; font-size: 16px; min-width: 0; }
        .btn-ocr { background: #5856d6; color: white; width: 80px; font-size: 12px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        canvas { display: none; }
    </style>
</head>
<body>
    <div class="header-section">
        <div id="status" class="status-msg">枠に型番を密着させて右のボタン</div>
        <div id="interactive"><div class="scan-guide"></div></div>
    </div>
    <div id="result-area" class="list-container"></div>
    <div class="bottom-controls">
        <button id="next-btn" class="btn btn-next" onclick="prepareNextScan()" disabled>次へ</button>
        <button class="btn btn-download" onclick="downloadCSV()">CSV保存</button>
    </div>
    <canvas id="ocr-canvas"></canvas>

    <script>
        let isWaitingForNext = false;
        let lastProductGroupId = null;

        Quagga.init({
            inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#interactive'), constraints: { facingMode: "environment" } },
            decoder: { readers: ["ean_reader"] }
        }, (err) => { if (!err) Quagga.start(); });

        Quagga.onDetected((result) => {
            if (isWaitingForNext) return;
            const code = result.codeResult.code;
            isWaitingForNext = true;
            document.getElementById('next-btn').disabled = false;
            if (!lastProductGroupId || code.startsWith('45') || code.startsWith('49')) createNewProductGroup(code);
            if (window.navigator.vibrate) window.navigator.vibrate(100);
            updateStatus("JAN読込完了。型番を枠に合わせてボタン", "#34c759");
        });

        function createNewProductGroup(jan) {
            const resultArea = document.getElementById('result-area');
            const groupId = 'prod-' + Date.now();
            lastProductGroupId = groupId;
            const groupDiv = document.createElement('div');
            groupDiv.className = 'product-group';
            groupDiv.id = groupId;
            groupDiv.dataset.prodJan = jan;
            groupDiv.innerHTML = `<div class="input-row"><input type="text" class="model-input" id="input-${groupId}" placeholder="型番"><button class="btn btn-ocr" onclick="runOCR('${groupId}')"><span>📷</span><span>文字認識</span></button></div><span style="font-size:11px; color:#888;">JAN: ${jan}</span>`;
            resultArea.insertBefore(groupDiv, resultArea.firstChild);
        }

        async function runOCR(groupId) {
            updateStatus("解析中...", "#5856d6");
            const video = document.querySelector('video');
            const canvas = document.getElementById('ocr-canvas');
            const ctx = canvas.getContext('2d');

            // 1. 画像をキャプチャしてグレースケール化
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.filter = 'grayscale(1) contrast(2) brightness(1.2)';
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            try {
                // 英数字に絞って認識 (tessedit_char_whitelist)
                const result = await Tesseract.recognize(canvas, 'eng', {
                    tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz-'
                });
                const text = result.data.text.trim().replace(/\n/g, "");
                document.getElementById(`input-${groupId}`).value = text;
                updateStatus(text ? "読み取り完了" : "失敗：もっと近づけて", text ? "#34c759" : "#ff3b30");
            } catch (e) { updateStatus("OCRエラー", "#ff3b30"); }
        }

        function prepareNextScan() { isWaitingForNext = false; document.getElementById('next-btn').disabled = true; updateStatus("スキャン待機中", "#ff3b30"); }
        function updateStatus(t, c) { const s = document.getElementById('status'); s.innerText = t; s.style.color = c; }
        function downloadCSV() { /* 前と同じ */ }
    </script>
</body>
</html>
