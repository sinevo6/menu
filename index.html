<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>型番・割引 撮影スキャナー(自動抽出版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <!-- 文字認識ライブラリを追加 -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 0; background: #f2f2f7; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .fixed-top { background: #fff; border-bottom: 1px solid #d1d1d6; z-index: 100; flex-shrink: 0; }
        #interactive { width: 100%; height: 140px; background: #000; position: relative; overflow: hidden; }
        #interactive video { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100% !important; height: auto !important; }
        #confirm-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 140px; background: rgba(0,0,0,0.85); color: white; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .confirm-btns { display: flex; gap: 15px; margin-top: 10px; }
        .c-btn { border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; }
        .btn-ok { background: #34c759; color: white; }
        .btn-cancel { background: #ff3b30; color: white; }
        
        .status-msg { text-align: center; font-size: 13px; font-weight: bold; padding: 8px; color: #ff3b30; min-height: 18px; }
        .action-area { padding: 10px; background: #fff; border-bottom: 1px solid #d1d1d6; display: flex; flex-direction: column; gap: 10px; }
        
        .btn-row { display: flex; flex-direction: column; gap: 8px; }
        .btn-main { border: none; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: bold; width: 100%; }
        .btn-cap-model { background: #007aff; color: white; }
        .btn-cap-discount { background: #34c759; color: white; }
        .btn-next { background: #8e8e93; color: white; margin-top: 5px; }
        .btn-main:disabled { opacity: 0.3; }

        .list-container { flex: 1; overflow-y: auto; padding: 10px; padding-bottom: 100px; }
        .product-group { background: white; border-radius: 12px; margin-bottom: 15px; border: 1px solid #e5e5ea; padding: 12px; display: flex; flex-direction: column; gap: 12px; }
        
        .input-unit { display: flex; flex-direction: column; gap: 4px; }
        .input-unit label { font-size: 12px; color: #555; font-weight: bold; }
        .model-input { width: 100%; border: 2px solid #007aff; padding: 12px; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .discount-input { width: 100%; border: 2px solid #34c759; padding: 12px; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        
        .img-container { display: flex; gap: 8px; }
        .captured-img-box { flex: 1; text-align: center; }
        .captured-img-box span { display: block; font-size: 10px; margin-bottom: 4px; color: #666; }
        .captured-img { width: 100%; border-radius: 6px; border: 2px solid #eee; display: none; aspect-ratio: 1/1; object-fit: cover; }
        
        .footer-save { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px; border-top: 1px solid #d1d1d6; box-sizing: border-box; }
        .btn-download { background: #ff9500; color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 16px; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="fixed-top">
    <div id="status" class="status-msg">商品JANをスキャンしてください</div>
    <div id="interactive">
        <div id="confirm-overlay">
            <div style="font-size: 16px;">JAN: <span id="scanned-jan">---</span></div>
            <div class="confirm-btns">
                <button class="c-btn btn-ok" onclick="confirmJan()">OK</button>
                <button class="c-btn btn-cancel" onclick="resetScan()">やり直し</button>
            </div>
        </div>
    </div>
    <div class="action-area">
        <div class="btn-row">
            <button id="cap-model-btn" class="btn-main btn-cap-model" onclick="capturePhoto('model')" disabled>📷 型番を撮影(自動解析)</button>
            <button id="cap-discount-btn" class="btn-main btn-cap-discount" onclick="capturePhoto('discount')" disabled>📷 割引JANを撮影(自動解析)</button>
        </div>
        <button id="next-btn" class="btn-main btn-next" onclick="prepareNextScan()" disabled>次の商品へ</button>
    </div>
</div>

<div id="result-area" class="list-container"></div>
<div class="footer-save"><button class="btn-download" onclick="downloadCSV()">CSVを保存する</button></div>
<canvas id="capture-canvas"></canvas>

<script>
    const YAHOO_APP_ID = 'dmVyPTIwMjUwNyZpZD1HYWY1RGV1Q1NWJmhhc2g9TlRJM1ltVXdZVGhtWW1WaFlXTTRaUQ'; 

    let isScanning = true;
    let tempJan = null;
    let lastGroupId = null;

    Quagga.init({
        inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#interactive'), constraints: { facingMode: "environment" } },
        decoder: { readers: ["ean_reader"] }
    }, (err) => { if (!err) Quagga.start(); });

    Quagga.onDetected((result) => {
        if (!isScanning) return;
        isScanning = false;
        tempJan = result.codeResult.code;
        document.getElementById('scanned-jan').innerText = tempJan;
        document.getElementById('confirm-overlay').style.display = 'flex';
    });

    async function confirmJan() {
        document.getElementById('confirm-overlay').style.display = 'none';
        document.getElementById('cap-model-btn').disabled = false;
        document.getElementById('cap-discount-btn').disabled = false;
        document.getElementById('next-btn').disabled = false;
        
        lastGroupId = createNewProductGroup(tempJan);
        updateStatus("商品名を取得中...", "#007aff");

        const foundName = await fetchProductName(tempJan);
        document.getElementById(`input-${lastGroupId}`).value = foundName;
        updateStatus("撮影ボタンで自動入力を開始します", "#34c759");
    }

    async function fetchProductName(jan) {
        try {
            const proxy = "https://corsproxy.io/?";
            const targetUrl = `https://shopping.yahooapis.jp/ShoppingWebService/V3/itemSearch?appid=${YAHOO_APP_ID}&jan_code=${jan}&results=1`;
            const response = await fetch(proxy + encodeURIComponent(targetUrl));
            const data = await response.json();
            return (data.hits && data.hits.length > 0) ? data.hits[0].name : "検索ヒットなし";
        } catch (e) { return "取得失敗"; }
    }

    function createNewProductGroup(jan) {
        const resultArea = document.getElementById('result-area');
        const groupId = 'prod-' + Date.now();
        const groupDiv = document.createElement('div');
        groupDiv.className = 'product-group';
        groupDiv.id = groupId;
        groupDiv.dataset.prodJan = jan;
        
        groupDiv.innerHTML = `
            <div class="input-unit">
                <label style="color:#007aff;">【青】商品名・型番</label>
                <input type="text" class="model-input" id="input-${groupId}" placeholder="撮影で自動入力">
            </div>
            <div class="img-container">
                <div class="captured-img-box">
                    <span>型番</span><img id="img-model-${groupId}" class="captured-img" style="border-color:#007aff;">
                </div>
                <div class="captured-img-box">
                    <span>割引JAN</span><img id="img-discount-${groupId}" class="captured-img" style="border-color:#34c759;">
                </div>
            </div>
            <div class="input-unit">
                <label style="color:#34c759;">【緑】割引施策JAN</label>
                <input type="text" class="discount-input" id="discount-${groupId}" placeholder="撮影で自動入力">
            </div>
            <div style="font-size:10px; color:#999; text-align:right;">JAN: ${jan}</div>
        `;
        resultArea.insertBefore(groupDiv, resultArea.firstChild);
        return groupId;
    }

    async function capturePhoto(type) {
        if (!lastGroupId) return;
        const video = document.querySelector('video');
        const canvas = document.getElementById('capture-canvas');
        const img = document.getElementById(`img-${type}-${lastGroupId}`);
        
        canvas.width = video.videoWidth; 
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);
        
        const dataUrl = canvas.toDataURL('image/png');
        img.src = dataUrl;
        img.style.display = 'block';

        updateStatus("解析中...少々お待ちください", "#5856d6");

        // 文字認識の実行
        try {
            const result = await Tesseract.recognize(dataUrl, 'eng+jpn');
            const text = result.data.text;
            
            if (type === 'discount') {
                // 数字のみを抽出して入力
                const digits = text.replace(/[^0-9]/g, '');
                if (digits) document.getElementById(`discount-${lastGroupId}`).value = digits;
            } else {
                // 型番などはそのまま入力
                document.getElementById(`input-${lastGroupId}`).value = text.trim();
            }
            updateStatus("読み込み完了！(ズレは修正してください)", "#34c759");
        } catch (e) {
            updateStatus("読み取り失敗。手入力かコピペしてください", "#ff3b30");
        }
    }

    function prepareNextScan() {
        document.querySelectorAll('.captured-img').forEach(el => el.style.display = 'none');
        isScanning = true;
        document.getElementById('cap-model-btn').disabled = true;
        document.getElementById('cap-discount-btn').disabled = true;
        document.getElementById('next-btn').disabled = true;
        updateStatus("次の商品JANをスキャンしてください", "#ff3b30");
    }

    function resetScan() {
        document.getElementById('confirm-overlay').style.display = 'none';
        isScanning = true;
    }

    function updateStatus(t, c) {
        const s = document.getElementById('status');
        s.innerText = t; s.style.color = c;
    }

    function downloadCSV() {
        let csvContent = "\uFEFF商品名/型番,商品JAN,割引JAN\n";
        document.querySelectorAll('.product-group').forEach(group => {
            const name = group.querySelector('.model-input').value || "";
            const jan = group.dataset.prodJan;
            const discountJan = group.querySelector('.discount-input').value || "";
            csvContent += `"${name}","${jan}","${discountJan}"\n`;
        });
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `scans_${new Date().getTime()}.csv`;
        link.click();
    }
</script>
</body>
</html>
