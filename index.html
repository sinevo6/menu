<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>13桁厳格判定版 Wスキャナー</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 0; background: #f2f2f7; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .fixed-top { background: #fff; border-bottom: 1px solid #d1d1d6; z-index: 1000; flex-shrink: 0; }
        #interactive { width: 100%; height: 180px; background: #000; position: relative; overflow: hidden; }
        #interactive video { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100% !important; height: auto !important; }
        .scan-guide { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; height: 60px; border: 3px solid #ff3b30; box-shadow: 0 0 0 1000px rgba(0,0,0,0.4); pointer-events: none; z-index: 5; transition: border-color 0.2s; }

        #scan-popup { 
            position: absolute; bottom: 10px; left: 10px; right: 10px; 
            background: rgba(255, 255, 255, 0.98); border-radius: 12px; 
            padding: 15px; display: none; flex-direction: row; 
            align-items: center; justify-content: space-between; 
            z-index: 100; box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            border: 2px solid #34c759;
        }
        
        .status-msg { text-align: center; font-size: 13px; font-weight: bold; padding: 8px; color: #ff3b30; min-height: 18px; }
        .action-area { padding: 10px; background: #fff; border-bottom: 1px solid #d1d1d6; display: flex; flex-direction: column; gap: 8px; }
        .btn-row { display: flex; gap: 8px; }
        .btn-main { border: none; padding: 15px; border-radius: 12px; font-size: 14px; font-weight: bold; width: 100%; -webkit-tap-highlight-color: transparent; }
        .btn-cap-model { background: #007aff; color: white; }
        .btn-scan-discount { background: #34c759; color: white; }
        .btn-next { background: #8e8e93; color: white; }
        .btn-main:disabled { opacity: 0.3; }

        .list-container { flex: 1; overflow-y: auto; padding: 10px; padding-bottom: 100px; }
        .product-group { background: white; border-radius: 12px; margin-bottom: 15px; border: 1px solid #e5e5ea; padding: 15px; position: relative; }
        .del-btn { position: absolute; top: 10px; right: 10px; background: #ff3b30; color: white; border: none; width: 28px; height: 28px; border-radius: 14px; font-size: 16px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .input-unit { display: flex; flex-direction: column; gap: 4px; padding-right: 35px; margin-bottom: 8px; }
        .input-unit label { font-size: 11px; color: #555; font-weight: bold; }
        .model-input { width: 100%; border: 1px solid #ccc; padding: 10px; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .discount-input { width: 100%; border: 1px solid #ccc; padding: 10px; border-radius: 8px; font-size: 16px; background: #f0fff0; box-sizing: border-box; }
        
        .footer-save { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px; border-top: 1px solid #d1d1d6; z-index: 500; }
        .btn-download { background: #ff9500; color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="fixed-top">
    <div id="status" class="status-msg">13桁のJANコードをスキャンしてください</div>
    <div id="interactive">
        <div class="scan-guide" id="guide"></div>
        <div id="scan-popup">
            <div>
                <div style="font-size: 10px; color: #666;" id="mode-text">13桁検知完了</div>
                <div style="font-size: 20px; font-weight: bold; color: #000;" id="scanned-jan">---</div>
            </div>
            <div style="display: flex; gap: 8px;">
                <button onclick="resetScan()" style="background:#eee; border:none; padding:10px; border-radius:8px;">リトライ</button>
                <button onclick="confirmScan()" style="background:#34c759; color:white; border:none; padding:10px 20px; border-radius:8px; font-weight:bold;">OK</button>
            </div>
        </div>
    </div>
    <div class="action-area">
        <div class="btn-row">
            <button id="cap-model-btn" class="btn-main btn-cap-model" onclick="autoCaptureModel()" disabled>📷 型番撮影・解析</button>
            <button id="scan-discount-btn" class="btn-main btn-scan-discount" onclick="startDiscountScan()" disabled>🔍 割引JANスキャン</button>
        </div>
        <button id="next-btn" class="btn-main btn-next" onclick="prepareNextScan()" disabled>次の商品へ</button>
    </div>
</div>

<div id="result-area" class="list-container"></div>
<div class="footer-save"><button class="btn-download" onclick="downloadCSV()">CSVを保存する</button></div>
<canvas id="capture-canvas"></canvas>

<script>
    const YAHOO_APP_ID = 'dmVyPTIwMjUwNyZpZD1HYWY1RGV1Q1NWJmhhc2g9TlRJM1ltVXdZVGhtWW1WaFlXTTRaUQ'; 
    let isScanning = true;
    let scanTarget = 'PRODUCT'; 
    let tempJan = null;
    let lastGroupId = null;

    // 誤認識防止用の変数
    let lastCodes = [];
    const REQUIRED_CONFIRMATIONS = 3; // 3回同じ数字を認識したら確定

    Quagga.init({
        inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#interactive'), constraints: { facingMode: "environment", focusMode: "continuous" } },
        decoder: { readers: ["ean_reader"] }, // 13桁のJAN(EAN)のみに特化
        locate: true,
        frequency: 10 // スキャンスピード調整
    }, (err) => { if (!err) Quagga.start(); });

    Quagga.onDetected((result) => {
        if (!isScanning) return;
        
        const code = result.codeResult.code;

        // 【重要】13桁以外は無視する
        if (!code || code.length !== 13) return;

        // 精度向上のための連続一致チェック
        lastCodes.push(code);
        if (lastCodes.length < REQUIRED_CONFIRMATIONS) return;

        // 全て同じコードか確認
        const allMatch = lastCodes.every(c => c === lastCodes[0]);
        if (!allMatch) {
            lastCodes.shift();
            return;
        }

        // 13桁かつ3回連続一致で確定
        isScanning = false;
        lastCodes = [];
        tempJan = code;
        
        document.getElementById('guide').style.borderColor = "#34c759";
        document.getElementById('scanned-jan').innerText = tempJan;
        document.getElementById('mode-text').innerText = (scanTarget === 'PRODUCT') ? "商品JAN (13桁)" : "割引JAN (13桁)";
        document.getElementById('scan-popup').style.display = 'flex';
        if (window.navigator.vibrate) window.navigator.vibrate([50, 30, 50]);
    });

    async function confirmScan() {
        document.getElementById('scan-popup').style.display = 'none';
        document.getElementById('guide').style.borderColor = "#ff3b30";
        
        if (scanTarget === 'PRODUCT') {
            lastGroupId = createNewProductGroup(tempJan);
            updateStatus("商品名取得中...", "#007aff");
            const name = await fetchProductName(tempJan);
            document.getElementById(`input-${lastGroupId}`).value = name;
            
            document.getElementById('cap-model-btn').disabled = false;
            document.getElementById('scan-discount-btn').disabled = false;
            document.getElementById('next-btn').disabled = false;
            updateStatus("型番撮影か割引スキャンを選択", "#34c759");
        } else {
            document.getElementById(`discount-${lastGroupId}`).value = tempJan;
            updateStatus("割引JAN入力完了", "#34c759");
            scanTarget = 'PRODUCT';
        }
    }

    async function autoCaptureModel() {
        if (!lastGroupId) return;
        updateStatus("解析中...", "#5856d6");
        const video = document.querySelector('video');
        const canvas = document.getElementById('capture-canvas');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        
        const dataUrl = canvas.toDataURL('image/png');
        try {
            const result = await Tesseract.recognize(dataUrl, 'eng+jpn');
            document.getElementById(`input-${lastGroupId}`).value = result.data.text.trim();
            updateStatus("型番解析成功", "#34c759");
        } catch (e) {
            updateStatus("解析失敗。手入力してください", "#ff3b30");
        }
    }

    function startDiscountScan() {
        scanTarget = 'DISCOUNT';
        isScanning = true;
        lastCodes = [];
        updateStatus("割引JAN(13桁)をスキャン...", "#34c759");
        document.getElementById('guide').style.borderColor = "#34c759";
    }

    async function fetchProductName(jan) {
        try {
            const proxy = "https://corsproxy.io/?";
            const targetUrl = `https://shopping.yahooapis.jp/ShoppingWebService/V3/itemSearch?appid=${YAHOO_APP_ID}&jan_code=${jan}&results=1`;
            const response = await fetch(proxy + encodeURIComponent(targetUrl));
            const data = await response.json();
            return (data.hits && data.hits.length > 0) ? data.hits[0].name : "検索ヒットなし";
        } catch (e) { return "取得失敗"; }
    }

    function createNewProductGroup(jan) {
        const resultArea = document.getElementById('result-area');
        const groupId = 'prod-' + Date.now();
        const groupDiv = document.createElement('div');
        groupDiv.className = 'product-group';
        groupDiv.id = groupId;
        groupDiv.dataset.prodJan = jan;
        
        groupDiv.innerHTML = `
            <button class="del-btn" onclick="deleteRow('${groupId}')">×</button>
            <div class="input-unit"><label>型番/商品名</label>
            <input type="text" class="model-input" id="input-${groupId}"></div>
            <div class="input-unit"><label>割引施策JAN</label>
            <input type="text" class="discount-input" id="discount-${groupId}" placeholder="13桁スキャン"></div>
            <div style="font-size:10px; color:#999; text-align:right;">JAN: ${jan}</div>
        `;
        resultArea.insertBefore(groupDiv, resultArea.firstChild);
        return groupId;
    }

    function deleteRow(id) {
        if(confirm('このレコードを削除しますか？')) {
            const el = document.getElementById(id);
            if(el) el.remove();
        }
    }

    function prepareNextScan() {
        scanTarget = 'PRODUCT';
        isScanning = true;
        lastCodes = [];
        document.getElementById('cap-model-btn').disabled = true;
        document.getElementById('scan-discount-btn').disabled = true;
        document.getElementById('next-btn').disabled = true;
        document.getElementById('guide').style.borderColor = "#ff3b30";
        updateStatus("次の商品JAN(13桁)をスキャン...", "#ff3b30");
    }

    function resetScan() {
        document.getElementById('scan-popup').style.display = 'none';
        isScanning = true;
        lastCodes = [];
    }

    function updateStatus(t, c) {
        const s = document.getElementById('status');
        s.innerText = t; s.style.color = c;
    }

    function downloadCSV() {
        let csvContent = "\uFEFF商品名/型番,商品JAN,割引JAN\n";
        document.querySelectorAll('.product-group').forEach(group => {
            const name = group.querySelector('.model-input').value || "";
            const jan = group.dataset.prodJan;
            const discountJan = group.querySelector('.discount-input').value || "";
            csvContent += `"${name}","${jan}","${discountJan}"\n`;
        });
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `scans_${new Date().getTime()}.csv`;
        link.click();
    }
</script>
</body>
</html>
