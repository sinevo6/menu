<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>型番・割引スキャナー(Wスキャン版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 0; background: #f2f2f7; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .fixed-top { background: #fff; border-bottom: 1px solid #d1d1d6; z-index: 100; flex-shrink: 0; }
        #interactive { width: 100%; height: 140px; background: #000; position: relative; overflow: hidden; }
        #interactive video { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100% !important; height: auto !important; }
        #confirm-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 140px; background: rgba(0,0,0,0.85); color: white; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .confirm-btns { display: flex; gap: 15px; margin-top: 10px; }
        .c-btn { border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; }
        .btn-ok { background: #34c759; color: white; }
        .btn-cancel { background: #ff3b30; color: white; }
        
        /* モード表示 */
        .mode-indicator { background: #007aff; color: white; text-align: center; font-size: 14px; font-weight: bold; padding: 5px; }
        .mode-discount { background: #34c759; }

        .status-msg { text-align: center; font-size: 13px; font-weight: bold; padding: 8px; color: #ff3b30; min-height: 18px; }
        .action-area { padding: 10px; background: #fff; border-bottom: 1px solid #d1d1d6; display: flex; flex-direction: column; gap: 8px; }
        .btn-main { border: none; padding: 15px; border-radius: 12px; font-size: 16px; font-weight: bold; width: 100%; }
        .btn-next { background: #007aff; color: white; }
        
        .list-container { flex: 1; overflow-y: auto; padding: 10px; padding-bottom: 100px; }
        .product-group { background: white; border-radius: 12px; margin-bottom: 10px; border: 1px solid #e5e5ea; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .input-unit { display: flex; flex-direction: column; gap: 3px; }
        .input-unit label { font-size: 11px; color: #555; font-weight: bold; }
        .model-input { width: 100%; border: 2px solid #007aff; padding: 10px; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .discount-input { width: 100%; border: 2px solid #34c759; padding: 10px; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .jan-label { font-size: 11px; color: #888; }
        .footer-save { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px; border-top: 1px solid #d1d1d6; }
        .btn-download { background: #34c759; color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="fixed-top">
    <div id="mode-bar" class="mode-indicator">商品JAN スキャン待機中</div>
    <div id="interactive">
        <div id="confirm-overlay">
            <div style="font-size: 16px;">JAN: <span id="scanned-jan">---</span></div>
            <div class="confirm-btns">
                <button class="c-btn btn-ok" onclick="confirmScan()">OK</button>
                <button class="c-btn btn-cancel" onclick="resetScan()">やり直し</button>
            </div>
        </div>
    </div>
    <div class="status-msg" id="status">バーコードを枠内にいれてください</div>
    <div class="action-area">
        <button id="next-btn" class="btn-main btn-next" onclick="finishProduct()" disabled>次へ (保存して商品スキャンへ)</button>
    </div>
</div>

<div id="result-area" class="list-container"></div>
<div class="footer-save"><button class="btn-download" onclick="downloadCSV()">CSVを保存する</button></div>

<script>
    const YAHOO_APP_ID = 'dmVyPTIwMjUwNyZpZD1HYWY1RGV1Q1NWJmhhc2g9TlRJM1ltVXdZVGhtWW1WaFlXTTRaUQ'; 

    let isScanning = true;
    let scanMode = 'PRODUCT'; // 'PRODUCT' or 'DISCOUNT'
    let tempJan = null;
    let currentGroupId = null;

    Quagga.init({
        inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#interactive'), constraints: { facingMode: "environment" } },
        decoder: { readers: ["ean_reader"] }
    }, (err) => { if (!err) Quagga.start(); });

    Quagga.onDetected((result) => {
        if (!isScanning) return;
        isScanning = false;
        tempJan = result.codeResult.code;
        document.getElementById('scanned-jan').innerText = tempJan;
        document.getElementById('confirm-overlay').style.display = 'flex';
        if (window.navigator.vibrate) window.navigator.vibrate(100);
    });

    async function confirmScan() {
        document.getElementById('confirm-overlay').style.display = 'none';
        
        if (scanMode === 'PRODUCT') {
            // 商品JANのスキャン完了
            currentGroupId = createNewProductGroup(tempJan);
            updateStatus("商品名を取得中...", "#5856d6");
            const foundName = await fetchProductName(tempJan);
            document.getElementById(`input-${currentGroupId}`).value = foundName;
            
            // 割引JANスキャンモードへ切り替え
            scanMode = 'DISCOUNT';
            setModeDisplay("割引JAN スキャン待機中", true);
            updateStatus("割引バーコードをスキャンしてください", "#34c759");
            isScanning = true; // スキャン再開
            document.getElementById('next-btn').disabled = false;
        } else {
            // 割引JANのスキャン完了
            document.getElementById(`discount-${currentGroupId}`).value = tempJan;
            updateStatus("割引JAN入力完了。さらにスキャンも可能", "#34c759");
            isScanning = true; // 続けてスキャン可能（上書き）
        }
    }

    async function fetchProductName(jan) {
        try {
            const proxy = "https://corsproxy.io/?";
            const targetUrl = `https://shopping.yahooapis.jp/ShoppingWebService/V3/itemSearch?appid=${YAHOO_APP_ID}&jan_code=${jan}&results=1`;
            const response = await fetch(proxy + encodeURIComponent(targetUrl));
            const data = await response.json();
            return (data.hits && data.hits.length > 0) ? data.hits[0].name : "検索ヒットなし";
        } catch (e) { return "取得失敗"; }
    }

    function createNewProductGroup(jan) {
        const resultArea = document.getElementById('result-area');
        const groupId = 'prod-' + Date.now();
        const groupDiv = document.createElement('div');
        groupDiv.className = 'product-group';
        groupDiv.id = groupId;
        groupDiv.dataset.prodJan = jan;
        groupDiv.innerHTML = `
            <div class="input-unit"><label>商品名・型番</label>
            <input type="text" class="model-input" id="input-${groupId}" onclick="this.select()"></div>
            <div class="input-unit"><label>割引施策JAN</label>
            <input type="text" class="discount-input" id="discount-${groupId}" placeholder="スキャンで自動入力"></div>
            <span class="jan-label">商品JAN: ${jan}</span>
        `;
        resultArea.insertBefore(groupDiv, resultArea.firstChild);
        return groupId;
    }

    function finishProduct() {
        scanMode = 'PRODUCT';
        setModeDisplay("商品JAN スキャン待機中", false);
        isScanning = true;
        document.getElementById('next-btn').disabled = true;
        updateStatus("次の商品のJANをスキャン", "#ff3b30");
    }

    function resetScan() {
        document.getElementById('confirm-overlay').style.display = 'none';
        isScanning = true;
    }

    function setModeDisplay(text, isDiscount) {
        const bar = document.getElementById('mode-bar');
        bar.innerText = text;
        if (isDiscount) bar.classList.add('mode-discount');
        else bar.classList.remove('mode-discount');
    }

    function updateStatus(t, c) {
        const s = document.getElementById('status');
        s.innerText = t; s.style.color = c;
    }

    function downloadCSV() {
        let csvContent = "\uFEFF商品名/型番,商品JAN,割引JAN\n";
        document.querySelectorAll('.product-group').forEach(group => {
            const name = group.querySelector('.model-input').value || "";
            const jan = group.dataset.prodJan;
            const discountJan = group.querySelector('.discount-input').value || "";
            csvContent += `"${name}","${jan}","${discountJan}"\n`;
        });
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `scans_${new Date().getTime()}.csv`;
        link.click();
    }
</script>
</body>
</html>
