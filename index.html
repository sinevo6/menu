<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>選択フォーカス機能付 Wスキャナー</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 0; background: #f2f2f7; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .fixed-top { background: #fff; border-bottom: 1px solid #d1d1d6; z-index: 1000; flex-shrink: 0; }
        
        #interactive { width: 100%; height: 180px; background: #000; position: relative; overflow: hidden; }
        #interactive video { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100% !important; height: auto !important; }
        .scan-guide { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; height: 60px; border: 3px solid #8e8e93; box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); pointer-events: none; z-index: 5; }

        #scan-popup { 
            position: absolute; bottom: 10px; left: 10px; right: 10px; 
            background: rgba(255, 255, 255, 0.98); border-radius: 12px; 
            padding: 15px; display: none; flex-direction: row; 
            align-items: center; justify-content: space-between; 
            z-index: 100; box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            border: 2px solid #007aff;
        }
        
        .status-msg { text-align: center; font-size: 13px; font-weight: bold; padding: 10px; color: #8e8e93; min-height: 18px; }
        .action-area { padding: 10px; background: #fff; border-bottom: 1px solid #d1d1d6; display: flex; flex-direction: column; gap: 8px; }
        .btn-row { display: flex; gap: 8px; }
        .btn-main { border: none; padding: 16px; border-radius: 12px; font-size: 15px; font-weight: bold; width: 100%; cursor: pointer; }
        
        .btn-scan-prod { background: #007aff; color: white; }
        .btn-scan-discount { background: #34c759; color: white; }
        .btn-main:disabled { background: #e5e5ea; color: #aeaeb2; cursor: not-allowed; }

        .list-container { flex: 1; overflow-y: auto; padding: 10px; padding-bottom: 100px; }
        
        /* カードのデザインと選択時のスタイル */
        .product-group { 
            background: white; border-radius: 12px; margin-bottom: 15px; 
            border: 2px solid transparent; padding: 15px; position: relative; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: all 0.2s;
        }
        .product-group.selected { 
            border-color: #007aff; 
            background-color: #f0f7ff; 
            box-shadow: 0 4px 12px rgba(0,122,255,0.2);
        }
        .selected-badge { 
            display: none; position: absolute; top: -10px; left: 10px; 
            background: #007aff; color: white; font-size: 10px; 
            padding: 2px 8px; border-radius: 10px; font-weight: bold;
        }
        .product-group.selected .selected-badge { display: block; }

        .del-btn { position: absolute; top: 10px; right: 10px; background: #ff3b30; color: white; border: none; width: 28px; height: 28px; border-radius: 14px; font-size: 16px; font-weight: bold; display: flex; align-items: center; justify-content: center; z-index: 10; }
        .input-unit { display: flex; flex-direction: column; gap: 4px; padding-right: 35px; margin-bottom: 8px; }
        .input-unit label { font-size: 11px; color: #8e8e93; font-weight: bold; }
        .model-input, .discount-input { width: 100%; border: 1px solid #d1d1d6; padding: 10px; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .discount-input { background: #fff; }
        .product-group.selected .discount-input { border-color: #34c759; background: #f0fff0; }

        .footer-save { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px; border-top: 1px solid #d1d1d6; z-index: 500; }
        .btn-download { background: #ff9500; color: white; border: none; width: 100%; padding: 16px; border-radius: 12px; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

<div class="fixed-top">
    <div id="status" class="status-msg">青ボタンで新規商品、リスト選択で割引追加</div>
    <div id="interactive">
        <div class="scan-guide" id="guide"></div>
        <div id="scan-popup">
            <div>
                <div style="font-size: 10px; color: #666;" id="mode-text">13桁検知</div>
                <div style="font-size: 20px; font-weight: bold; color: #000;" id="scanned-jan">---</div>
            </div>
            <div style="display: flex; gap: 8px;">
                <button onclick="resetScan()" style="background:#eee; border:none; padding:10px; border-radius:8px;">リトライ</button>
                <button onclick="confirmScan()" style="background:#007aff; color:white; border:none; padding:10px 20px; border-radius:8px; font-weight:bold;">確定</button>
            </div>
        </div>
    </div>
    <div class="action-area">
        <div class="btn-row">
            <button id="scan-prod-btn" class="btn-main btn-scan-prod" onclick="startProductScan()">🔍 商品JANスキャン</button>
            <button id="scan-discount-btn" class="btn-main btn-scan-discount" onclick="startDiscountScan()" disabled>🏷️ 割引JANスキャン</button>
        </div>
    </div>
</div>

<div id="result-area" class="list-container"></div>
<div class="footer-save"><button class="btn-download" onclick="downloadCSV()">CSVを保存する</button></div>

<script>
    const YAHOO_APP_ID = 'dmVyPTIwMjUwNyZpZD1HYWY1RGV1Q1NWJmhhc2g9TlRJM1ltVXdZVGhtWW1WaFlXTTRaUQ'; 
    let isScanning = false;
    let scanTarget = 'PRODUCT'; 
    let tempJan = null;
    let selectedGroupId = null;
    let lastCodes = [];
    const REQUIRED_CONFIRMATIONS = 3;

    Quagga.init({
        inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#interactive'), constraints: { facingMode: "environment", focusMode: "continuous" } },
        decoder: { readers: ["ean_reader"] },
        locate: true
    }, (err) => { if (!err) Quagga.start(); });

    Quagga.onDetected((result) => {
        if (!isScanning) return;
        const code = result.codeResult.code;
        if (!code || code.length !== 13) return;

        lastCodes.push(code);
        if (lastCodes.length < REQUIRED_CONFIRMATIONS) return;
        const allMatch = lastCodes.every(c => c === lastCodes[0]);
        if (!allMatch) { lastCodes.shift(); return; }

        isScanning = false;
        lastCodes = [];
        tempJan = code;
        
        document.getElementById('guide').style.borderColor = "#34c759";
        document.getElementById('scanned-jan').innerText = tempJan;
        document.getElementById('mode-text').innerText = (scanTarget === 'PRODUCT') ? "商品JAN" : "割引JAN";
        document.getElementById('scan-popup').style.display = 'flex';
        if (window.navigator.vibrate) window.navigator.vibrate([50, 30, 50]);
    });

    function startProductScan() {
        scanTarget = 'PRODUCT';
        isScanning = true;
        lastCodes = [];
        document.getElementById('scan-popup').style.display = 'none';
        document.getElementById('guide').style.borderColor = "#007aff";
        updateStatus("商品JAN(13桁)を狙ってください", "#007aff");
    }

    function startDiscountScan() {
        if (!selectedGroupId) {
            alert("割引を追加する商品をリストから選んでください");
            return;
        }
        scanTarget = 'DISCOUNT';
        isScanning = true;
        lastCodes = [];
        document.getElementById('scan-popup').style.display = 'none';
        document.getElementById('guide').style.borderColor = "#34c759";
        updateStatus("割引JAN(13桁)を狙ってください", "#34c759");
    }

    async function confirmScan() {
        document.getElementById('scan-popup').style.display = 'none';
        document.getElementById('guide').style.borderColor = "#8e8e93";
        
        if (scanTarget === 'PRODUCT') {
            const newId = createNewProductGroup(tempJan);
            selectGroup(newId); // 新規作成時は自動選択
            updateStatus("商品名を検索中...", "#007aff");
            const name = await fetchProductName(tempJan);
            document.getElementById(`input-${newId}`).value = name;
            updateStatus("割引を追加する場合は緑ボタン", "#34c759");
        } else {
            document.getElementById(`discount-${selectedGroupId}`).value = tempJan;
            updateStatus("割引JANを上書きしました", "#34c759");
        }
    }

    function selectGroup(id) {
        // 全解除
        document.querySelectorAll('.product-group').forEach(el => el.classList.remove('selected'));
        
        const target = document.getElementById(id);
        if (target) {
            target.classList.add('selected');
            selectedGroupId = id;
            document.getElementById('scan-discount-btn').disabled = false;
        }
    }

    function createNewProductGroup(jan) {
        const resultArea = document.getElementById('result-area');
        const groupId = 'prod-' + Date.now();
        const groupDiv = document.createElement('div');
        groupDiv.className = 'product-group';
        groupDiv.id = groupId;
        groupDiv.dataset.prodJan = jan;
        // タップで選択できるように
        groupDiv.onclick = () => selectGroup(groupId);
        
        groupDiv.innerHTML = `
            <div class="selected-badge">選択中</div>
            <button class="del-btn" onclick="event.stopPropagation(); deleteRow('${groupId}')">×</button>
            <div class="input-unit"><label>商品名</label>
            <input type="text" class="model-input" id="input-${groupId}" onclick="event.stopPropagation()"></div>
            <div class="input-unit"><label>割引施策JAN</label>
            <input type="text" class="discount-input" id="discount-${groupId}" placeholder="未設定" onclick="event.stopPropagation()" readonly></div>
            <div style="font-size:10px; color:#999; text-align:right;">JAN: ${jan}</div>
        `;
        resultArea.insertBefore(groupDiv, resultArea.firstChild);
        return groupId;
    }

    async function fetchProductName(jan) {
        try {
            const proxy = "https://corsproxy.io/?";
            const targetUrl = `https://shopping.yahooapis.jp/ShoppingWebService/V3/itemSearch?appid=${YAHOO_APP_ID}&jan_code=${jan}&results=1`;
            const response = await fetch(proxy + encodeURIComponent(targetUrl));
            const data = await response.json();
            return (data.hits && data.hits.length > 0) ? data.hits[0].name : "商品名なし";
        } catch (e) { return "通信エラー"; }
    }

    function deleteRow(id) {
        if(confirm('このデータを削除しますか？')) {
            const el = document.getElementById(id);
            if(el) el.remove();
            if(id === selectedGroupId) {
                selectedGroupId = null;
                document.getElementById('scan-discount-btn').disabled = true;
            }
        }
    }

    function resetScan() {
        document.getElementById('scan-popup').style.display = 'none';
        isScanning = true;
        lastCodes = [];
    }

    function updateStatus(t, c) {
        const s = document.getElementById('status');
        s.innerText = t; s.style.color = c;
    }

    function downloadCSV() {
        let csvContent = "\uFEFF商品名,商品JAN,割引JAN\n";
        document.querySelectorAll('.product-group').forEach(group => {
            const name = group.querySelector('.model-input').value || "";
            const jan = group.dataset.prodJan;
            const discountJan = group.querySelector('.discount-input').value || "";
            csvContent += `"${name}","${jan}","${discountJan}"\n`;
        });
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `scans_${new Date().getTime()}.csv`;
        link.click();
    }
</script>
</body>
</html>
