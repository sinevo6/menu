<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作業管理 - 検索条件最適化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .whitespace-pre-wrap { white-space: pre-wrap; word-break: break-all; }
        .hidden-row { display: none; }
        mark { background-color: #fef08a; color: #1e293b; padding: 0 1px; }

        /* --- テーブル全体の幅固定（合計 550px） --- */
        #mainTable { 
            table-layout: fixed !important; 
            width: 550px !important; 
            border-collapse: collapse;
        }

        .col-arrow { width: 15px !important; text-align: center; color: #94a3b8; }
        .col-work-code { width: 30px !important; text-align: center; font-family: monospace; }
        .col-menu { width: 180px !important; }
        .col-default { width: 280px !important; }
        .col-price { width: 40px !important; text-align: right; }
        th.col-price { text-align: center !important; }
        .col-check { width: 30px !important; text-align: center; }

        th, td { 
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; 
            padding: 6px 4px !important; border: 1px solid #e2e8f0; font-size: 12px !important;
        }
        th { background-color: #1e293b; color: white; }

        #totalBar {
            position: sticky; top: 0; z-index: 50;
            background: #fff; border: 2px solid #6366f1;
            width: 550px;
        }
    </style>
</head>
<body class="bg-gray-100 p-4">

    <div class="max-w-6xl">
        <div id="totalBar" class="mb-3 p-3 rounded-lg shadow-md flex justify-between items-center">
            <div class="text-sm font-bold text-slate-600">選択中の合計:</div>
            <div class="text-xl font-black text-indigo-600">¥ <span id="totalAmount">0</span></div>
        </div>

        <div class="mb-3 flex items-center gap-3" style="width: 550px;">
            <input type="text" id="searchInput" placeholder="メニュー名で検索..." 
                class="flex-grow p-2 border border-slate-300 rounded text-sm focus:outline-none">
            
            <label class="flex items-center gap-1 text-slate-600 text-xs font-bold cursor-pointer whitespace-nowrap">
                <input type="checkbox" id="searchAllColumns" onchange="runSearch()"> 詳細も検索
            </label>
        </div>

        <div class="bg-white shadow-sm overflow-hidden hidden inline-block" id="tableContainer">
            <table id="mainTable">
                <thead><tr id="tableHeader"></tr></thead>
                <tbody id="tbody" class="text-slate-700"></tbody>
            </table>
        </div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRguVx6K4z5w1QNwtfIwbY_f6Ikaqwawj7MmsWCWxNmJG7ugKAnvmrluW2Oxoz5FfiLvKSWRvJ23GXN/pub?output=csv';
        const detailColumnNames = ["作業内容", "補足事項", "関連メニュー"];
        let allData = []; let mapping = { main: [], detail: [] };

        async function init() {
            try {
                const res = await fetch(csvUrl);
                const text = await res.text();
                allData = parseCSV(text);
                buildHeader(allData[0]);
                render(allData.slice(1));
                document.getElementById('searchInput').addEventListener('input', runSearch);
            } catch (e) { console.error(e); }
        }

        function runSearch() {
            render(allData.slice(1), document.getElementById('searchInput').value);
        }

        function parseCSV(s) {
            const arr = []; let q = false, r = [''], c = 0;
            for (let i = 0; i < s.length; i++) {
                const char = s[i], next = s[i+1];
                if (char === '"') { if (q && next === '"') { r[c] += '"'; i++; } else { q = !q; } }
                else if (char === ',' && !q) { r[++c] = ''; }
                else if (char === '\n' && !q) { arr.push(r); r = ['']; c = 0; }
                else if (char === '\r' && !q) continue;
                else r[c] += char;
            }
            if (r.length > 1 || r[0] !== '') arr.push(r);
            return arr;
        }

        function buildHeader(head) {
            const hEl = document.getElementById('tableHeader');
            hEl.innerHTML = '<th class="col-arrow"></th>';

            head.forEach((t, i) => {
                const txt = t.trim();
                if (txt.toUpperCase().includes("JAN")) return;
                let cls = "col-default";
                if (i === 0) cls = "col-work-code";
                else if (txt.includes("金額")) cls = "col-price";
                else if (txt.includes("メニュー")) cls = "col-menu";
                
                const conf = { i, label: txt, cls };
                if (detailColumnNames.some(d => txt.includes(d))) {
                    mapping.detail.push(conf);
                } else {
                    mapping.main.push(conf);
                    const th = document.createElement('th');
                    th.className = cls;
                    th.textContent = txt;
                    hEl.appendChild(th);
                }
            });
            hEl.innerHTML += '<th class="col-check"><input type="checkbox" id="masterCheck" onclick="toggleAllChecks(this.checked)"></th>';
        }

        function render(rows, s = "") {
            const b = document.getElementById('tbody');
            const isDetailSearch = document.getElementById('searchAllColumns').checked;
            b.innerHTML = "";
            const qs = s.trim().split(/\s+/).filter(q => q !== "");
            
            rows.forEach((row, rIdx) => {
                if (row.join('').trim() === "") return;
                
                // 検索判定
                const match = qs.length === 0 || qs.some(q => {
                    const searchWord = q.toLowerCase();
                    // 金額以外のメイン項目を検索
                    const inMain = mapping.main.some(c => {
                        if (c.label.includes("金額")) return false; 
                        return (row[c.i] || "").toLowerCase().includes(searchWord);
                    });
                    if (inMain) return true;
                    
                    // チェック時のみ詳細項目を検索
                    if (isDetailSearch) {
                        return mapping.detail.some(c => (row[c.i] || "").toLowerCase().includes(searchWord));
                    }
                    return false;
                });
                if (!match) return;

                // 詳細項目にヒットしているかの判定（アイコン背景色用）
                const detailMatch = qs.length > 0 && mapping.detail.some(c => {
                    const cellValue = (row[c.i] || "").toLowerCase();
                    return qs.some(q => cellValue.includes(q.toLowerCase()));
                });

                const trM = document.createElement('tr');
                trM.className = 'hover:bg-slate-50';

                const tdI = document.createElement('td');
                tdI.className = `col-arrow cursor-pointer ${detailMatch ? 'bg-amber-100' : ''}`;
                tdI.innerHTML = `<span id="ic-${rIdx}" style="transform: rotate(0deg)" class="inline-block transition-transform duration-200 text-[9px]">▶</span>`;
                tdI.onclick = () => toggleRow(rIdx);
                trM.appendChild(tdI);

                mapping.main.forEach(c => {
                    const td = document.createElement('td');
                    td.className = c.cls + (c.label.includes("金額") ? " font-bold text-indigo-700" : "") + " cursor-pointer";
                    // 金額列はハイライトしない
                    td.innerHTML = c.label.includes("金額") ? (row[c.i] || "") : highlight(row[c.i] || "", qs);
                    td.onclick = () => toggleRow(rIdx);
                    trM.appendChild(td);
                });

                const tdC = document.createElement('td');
                tdC.className = 'col-check';
                const priceMatch = (row[mapping.main.find(m => m.label.includes("金額"))?.i] || "").replace(/[^0-9]/g, '');
                tdC.innerHTML = `<input type="checkbox" class="row-check" data-price="${priceMatch || 0}" onclick="calcTotal()">`;
                trM.appendChild(tdC);

                b.appendChild(trM);

                const trD = document.createElement('tr');
                trD.id = `d-${rIdx}`;
                trD.className = 'hidden-row';
                const tdD = document.createElement('td');
                tdD.colSpan = mapping.main.length + 2;
                tdD.style.padding = "0";
                
                let html = `<div style="width:548px;" class="border-l-4 border-indigo-400 p-3 bg-slate-50 space-y-2">`;
                mapping.detail.forEach(c => {
                    html += `<div><div class="text-[9px] font-bold text-indigo-500">${c.label}</div>
                             <div class="text-[12px] text-slate-700 whitespace-pre-wrap">${highlight(row[c.i] || "---", qs)}</div></div>`;
                });
                tdD.innerHTML = html + '</div>';
                trD.appendChild(tdD);
                b.appendChild(trD);
            });
            document.getElementById('tableContainer').classList.remove('hidden');
            calcTotal();
        }

        function highlight(t, qs) {
            if (!qs.length || !t) return t;
            let h = t;
            qs.forEach(q => {
                const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, "gi");
                h = h.replace(re, '<mark>$1</mark>');
            });
            return h;
        }

        function toggleRow(idx) {
            const d = document.getElementById(`d-${idx}`);
            const ic = document.getElementById(`ic-${idx}`);
            if(!d) return;
            d.classList.toggle('hidden-row');
            ic.style.transform = d.classList.contains('hidden-row') ? 'rotate(0deg)' : 'rotate(90deg)';
        }

        function calcTotal() {
            const checks = document.querySelectorAll('.row-check:checked');
            let total = 0;
            checks.forEach(c => total += parseInt(c.dataset.price));
            document.getElementById('totalAmount').textContent = total.toLocaleString();
        }

        function toggleAllChecks(checked) {
            document.querySelectorAll('.row-check').forEach(c => c.checked = checked);
            calcTotal();
        }

        init();
    </script>
</body>
</html>
