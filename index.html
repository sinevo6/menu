<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>自動取得＋手動撮影ハイブリッドスキャナー</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 0; background: #f2f2f7; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .fixed-top { background: #fff; border-bottom: 1px solid #d1d1d6; z-index: 100; flex-shrink: 0; }
        #interactive { width: 100%; height: 140px; background: #000; position: relative; overflow: hidden; }
        #interactive video { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100% !important; height: auto !important; }
        
        /* JAN確認パネル */
        #confirm-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 140px; background: rgba(0,0,0,0.85); color: white; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .confirm-btns { display: flex; gap: 15px; margin-top: 10px; }
        .c-btn { border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; }
        .btn-ok { background: #34c759; color: white; }
        .btn-cancel { background: #ff3b30; color: white; }

        .status-msg { text-align: center; font-size: 13px; font-weight: bold; padding: 8px; color: #ff3b30; min-height: 18px; }
        .action-area { padding: 10px; background: #fff; border-bottom: 1px solid #d1d1d6; display: flex; flex-direction: column; gap: 8px; }
        
        .btn-main { border: none; padding: 15px; border-radius: 12px; font-size: 16px; font-weight: bold; width: 100%; }
        .btn-capture { background: #5856d6; color: white; }
        .btn-next { background: #007aff; color: white; }
        .btn-main:disabled { background: #d1d1d6; color: #8e8e93; }

        .list-container { flex: 1; overflow-y: auto; padding: 10px; padding-bottom: 100px; -webkit-overflow-scrolling: touch; }
        .product-group { background: white; border-radius: 12px; margin-bottom: 10px; border: 1px solid #e5e5ea; padding: 12px; }
        .model-input { width: 100%; border: 2px solid #007aff; padding: 12px; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .captured-img { width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid #eee; display: none; }
        .jan-label { font-size: 11px; color: #888; margin-top: 5px; display: block; }

        .footer-save { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.95); padding: 15px; padding-bottom: calc(15px + env(safe-area-inset-bottom)); border-top: 1px solid #d1d1d6; box-sizing: border-box; }
        .btn-download { background: #34c759; color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="fixed-top">
    <div id="status" class="status-msg">バーコードをスキャンしてください</div>
    <div id="interactive">
        <div id="confirm-overlay">
            <div style="font-size: 16px;">JAN: <span id="scanned-jan">---</span></div>
            <div class="confirm-btns">
                <button class="c-btn btn-ok" onclick="confirmJan()">OK (自動取得)</button>
                <button class="c-btn btn-cancel" onclick="resetScan()">やり直し</button>
            </div>
        </div>
    </div>
    <div class="action-area">
        <button id="cap-btn" class="btn-main btn-capture" onclick="capturePhoto()" disabled>📷 型番を撮影 (コピペ用)</button>
        <button id="next-btn" class="btn-main btn-next" onclick="prepareNextScan()" disabled>次へ (スキャン再開)</button>
    </div>
</div>

<div id="result-area" class="list-container"></div>

<div class="footer-save">
    <button class="btn-download" onclick="downloadCSV()">CSVを保存する</button>
</div>

<canvas id="capture-canvas"></canvas>

<script>
    // --------------------------------------------------
    const YAHOO_APP_ID = 'dmVyPTIwMjUwNyZpZD1HYWY1RGV1Q1NWJmhhc2g9TlRJM1ltVXdZVGhtWW1WaFlXTTRaUQ'; 
    // --------------------------------------------------

    let isScanning = true;
    let tempJan = null;
    let lastProductGroupId = null;

    Quagga.init({
        inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#interactive'), constraints: { facingMode: "environment" } },
        decoder: { readers: ["ean_reader"] }
    }, (err) => { if (!err) Quagga.start(); });

    Quagga.onDetected((result) => {
        if (!isScanning) return;
        isScanning = false;
        tempJan = result.codeResult.code;
        document.getElementById('scanned-jan').innerText = tempJan;
        document.getElementById('confirm-overlay').style.display = 'flex';
        if (window.navigator.vibrate) window.navigator.vibrate(100);
    });

    async function confirmJan() {
        document.getElementById('confirm-overlay').style.display = 'none';
        document.getElementById('cap-btn').disabled = false;
        document.getElementById('next-btn').disabled = false;
        
        const groupId = createNewProductGroup(tempJan);
        updateStatus("商品名を検索中...", "#5856d6");

        // APIで商品名取得を試みる
        const foundName = await fetchProductName(tempJan);
        document.getElementById(`input-${groupId}`).value = foundName;
        updateStatus(foundName.includes("エラー") ? "自動取得失敗：撮影してください" : "自動取得完了！", "#34c759");
    }

    async function fetchProductName(jan) {
        if (YAHOO_APP_ID === 'ここに入れてください') return "【ID未設定】撮影して入力";
        try {
            const url = `https://shopping.yahooapis.jp/ShoppingWebService/V3/itemSearch?appid=${YAHOO_APP_ID}&jan_code=${jan}&results=1`;
            const response = await fetch(url);
            const data = await response.json();
            return (data.hits && data.hits.length > 0) ? data.hits[0].name : "見つかりません（撮影してください）";
        } catch (e) {
            return "取得エラー（撮影してください）";
        }
    }

    function createNewProductGroup(jan) {
        const resultArea = document.getElementById('result-area');
        const groupId = 'prod-' + Date.now();
        lastProductGroupId = groupId;
        const groupDiv = document.createElement('div');
        groupDiv.className = 'product-group';
        groupDiv.id = groupId;
        groupDiv.dataset.prodJan = jan;
        groupDiv.innerHTML = `
            <input type="text" class="model-input" id="input-${groupId}" placeholder="商品名またはペースト">
            <span class="jan-label">JAN: ${jan}</span>
            <img id="img-${groupId}" class="captured-img">
        `;
        resultArea.insertBefore(groupDiv, resultArea.firstChild);
        return groupId;
    }

    function capturePhoto() {
        if (!lastProductGroupId) return;
        const video = document.querySelector('video');
        const canvas = document.getElementById('capture-canvas');
        const img = document.getElementById(`img-${lastProductGroupId}`);
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        img.src = canvas.toDataURL('image/png');
        img.style.display = 'block';
        updateStatus("画像を長押ししてコピペ修正可", "#5856d6");
    }

    function resetScan() {
        document.getElementById('confirm-overlay').style.display = 'none';
        isScanning = true;
        updateStatus("スキャン待機中", "#ff3b30");
    }

    function prepareNextScan() {
        document.querySelectorAll('.captured-img').forEach(el => el.style.display = 'none');
        isScanning = true;
        document.getElementById('cap-btn').disabled = true;
        document.getElementById('next-btn').disabled = true;
        updateStatus("次のバーコードを待機", "#ff3b30");
    }

    function updateStatus(t, c) {
        document.getElementById('status').innerText = t;
        document.getElementById('status').style.color = c;
    }

    function downloadCSV() {
        let csvContent = "\uFEFF商品名,JAN\n";
        document.querySelectorAll('.product-group').forEach(group => {
            const name = group.querySelector('.model-input').value || "";
            const jan = group.dataset.prodJan;
            csvContent += `"${name}","${jan}"\n`;
        });
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `scans.csv`;
        link.click();
    }
</script>
</body>
</html>
