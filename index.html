<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>型番コピペスキャナー</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 0; background: #f2f2f7; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header-section { background: #fff; border-bottom: 1px solid #d1d1d6; z-index: 100; }
        #interactive { width: 100%; height: 160px; background: #000; position: relative; overflow: hidden; }
        #interactive video { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100% !important; height: auto !important; }
        .status-msg { text-align: center; font-size: 13px; font-weight: bold; padding: 8px; color: #ff3b30; }
        
        .list-container { flex: 1; overflow-y: auto; padding: 10px; padding-bottom: 130px; }
        
        .bottom-controls { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.9); padding: 15px; display: flex; gap: 10px; border-top: 1px solid #d1d1d6; z-index: 1000; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        .btn { border: none; border-radius: 10px; font-weight: bold; flex: 1; padding: 15px; font-size: 16px; }
        .btn-next { background: #007aff; color: white; }
        .btn-download { background: #34c759; color: white; }

        .product-group { background: white; border-radius: 12px; margin-bottom: 12px; border: 1px solid #e5e5ea; padding: 12px; }
        .input-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .model-input { flex: 1; border: 2px solid #007aff; padding: 10px; border-radius: 8px; font-size: 17px; }
        
        /* 撮影した写真を表示するエリア */
        .captured-img { width: 100%; border-radius: 8px; margin-top: 8px; border: 1px solid #ddd; display: block; }
        .capture-btn { background: #5856d6; color: white; border: none; padding: 10px; border-radius: 8px; font-size: 14px; margin-bottom: 5px; width: 100%; }
        
        .jan-label { font-size: 11px; color: #888; }
        canvas { display: none; }
    </style>
</head>
<body>

    <div class="header-section">
        <div id="status" class="status-msg">JANをスキャンしてください</div>
        <div id="interactive"></div>
    </div>

    <div id="result-area" class="list-container"></div>

    <div class="bottom-controls">
        <button id="next-btn" class="btn btn-next" onclick="prepareNextScan()" disabled>次へ</button>
        <button class="btn btn-download" onclick="downloadCSV()">CSV保存</button>
    </div>

    <canvas id="capture-canvas"></canvas>

    <script>
        let isWaitingForNext = false;
        let lastProductGroupId = null;

        Quagga.init({
            inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#interactive'), constraints: { facingMode: "environment" } },
            decoder: { readers: ["ean_reader"] }
        }, (err) => { if (!err) Quagga.start(); });

        Quagga.onDetected((result) => {
            if (isWaitingForNext) return;
            const code = result.codeResult.code;
            isWaitingForNext = true;
            document.getElementById('next-btn').disabled = false;
            createNewProductGroup(code);
            if (window.navigator.vibrate) window.navigator.vibrate(100);
            updateStatus("JAN読込完了。型番を撮影してください", "#34c759");
        });

        function createNewProductGroup(jan) {
            const resultArea = document.getElementById('result-area');
            const groupId = 'prod-' + Date.now();
            lastProductGroupId = groupId;
            const groupDiv = document.createElement('div');
            groupDiv.className = 'product-group';
            groupDiv.id = groupId;
            groupDiv.dataset.prodJan = jan;
            
            groupDiv.innerHTML = `
                <div class="input-row">
                    <input type="text" class="model-input" id="input-${groupId}" placeholder="ここをタップしてペースト">
                </div>
                <button class="capture-btn" onclick="capturePhoto('${groupId}')">📷 型番を撮影（長押しでコピー用）</button>
                <img id="img-${groupId}" class="captured-img" style="display:none;">
                <span class="jan-label">JAN: ${jan}</span>
            `;
            resultArea.insertBefore(groupDiv, resultArea.firstChild);
        }

        // 写真を撮る機能
        function capturePhoto(groupId) {
            const video = document.querySelector('video');
            const canvas = document.getElementById('capture-canvas');
            const img = document.getElementById(`img-${groupId}`);
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // 写真を表示
            img.src = canvas.toDataURL('image/png');
            img.style.display = 'block';
            updateStatus("写真を長押しして「テキストをコピー」", "#5856d6");
        }

        function prepareNextScan() {
            isWaitingForNext = false;
            document.getElementById('next-btn').disabled = true;
            updateStatus("スキャン待機中", "#ff3b30");
        }

        function updateStatus(t, c) {
            const s = document.getElementById('status');
            s.innerText = t; s.style.color = c;
        }

        function downloadCSV() {
            let csvContent = "\uFEFF商品型番,商品JAN\n";
            document.querySelectorAll('.product-group').forEach(group => {
                const model = group.querySelector('.model-input').value || "";
                const jan = group.dataset.prodJan;
                csvContent += `"${model}","${jan}"\n`;
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `scans.csv`;
            link.click();
        }
    </script>
</body>
</html>
